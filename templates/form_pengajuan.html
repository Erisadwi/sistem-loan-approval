<!DOCTYPE html>
<html>
<head>
    <title>Form Pengajuan</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/riwayat.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>


/* HERO */
.hero-form{
    min-height:calc(100vh - 55px);
    display:flex;
    flex-direction:column;

    background:
    linear-gradient(
        135deg,
        #dfe9e2 0%,
        #e7efe8 55%,
        #f2ece8 42%,
        #f4e4ea 60%,
        #e8ebf6 82%,
        #d6e2f5 100%
    );

    position:relative;
    overflow:hidden;
}

/* SHINE EFFECT */
.hero-form::before{
    content:"";
    position:absolute;

    width:160%;
    height:320px;

    top:150px;
    left:-25%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.22),
        transparent
    );

    transform:rotate(-4deg);
}

/* CONTENT */
.content-wrapper{
    width:100%;

    padding:70px 90px 40px;

    position:relative;
    z-index:2;
}

/* TITLE */
.page-title{
    margin:10px 0 18px;
    font-size:45px;
    font-weight:800;
    color:#333;
}

/* CARD */
.card{
    width:100%;

    background:rgba(255,255,255,0.92);

    border-radius:28px;

    border:
        1px solid rgba(255,255,255,0.65);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.06);

    backdrop-filter:blur(10px);

    padding:38px;
}

/* FORM GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
}

/* GROUP */
.form-group{
    display:flex;
    flex-direction:column;
}

/* LABEL */
.form-group label{
    font-size:15px;
    font-weight:600;

    color:#444;

    margin-bottom:10px;
}

/* INPUT */
.form-group input,
.form-group select{
    padding:16px 18px;

    border-radius:16px;

    border:
        1px solid #e5e7eb;

    background:#fff;

    outline:none;

    font-size:15px;

    transition:0.3s;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#d8b4fe;

    box-shadow:
        0 0 0 4px rgba(216,180,254,0.15);
}

/* FULL WIDTH */
.full-width{
    grid-column:1 / -1;
}

/* BUTTON */
.submit-btn{
    margin-top:30px;

    padding:14px 26px;

    border:none;
    border-radius:999px;

    background:
    linear-gradient(
        135deg,
        #7da7ff,
        #5c7cfa
    );

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
        0 8px 18px rgba(92,124,250,0.25);
}

.submit-btn:hover{
    transform:
        translateY(-2px);

    box-shadow:
        0 12px 24px rgba(92,124,250,0.35);
}

.submit-area{
    display:flex;
    justify-content:flex-end;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;

    background:
        rgba(0,0,0,0.25);

    backdrop-filter:blur(8px);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;
}

/* POPUP */
.popup-box{
    width:380px;

    padding:35px;

    border-radius:28px;

    background:
        rgba(255,255,255,0.16);

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.18);

    text-align:center;

    color:white;

    animation:popupShow .3s ease;
}

/* POPUP TITLE */
.popup-box h3{
    font-size:30px;
    margin-bottom:16px;
}

/* POPUP TEXT */
.popup-box p{
    font-size:15px;

    line-height:1.7;

    color:
        rgba(255,255,255,0.88);
}

/* ANIMATION */
@keyframes popupShow{

    from{
        opacity:0;
        transform:
            scale(0.8);
    }

    to{
        opacity:1;
        transform:
            scale(1);
    }
}


</style>
</head>

<body>

<section class="hero-form">

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">

            <img
                src="{{ url_for('static', filename='uploads/crypto-wallet.png') }}"
                alt="logo"
            >

            <h1>Deciloan</h1>

        </div>

        <div class="nav-right">

            <ul class="nav-menu">

                <li>
                    <a href="/dashboard">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="/form" style="color:#ea08bd;">
                        Pengajuan
                    </a>
                </li>

                <li>
                    <a href="/review-ui">
                        Review
                    </a>
                </li>

                <li>
                    <a href="/case_base">
                        Basis Kasus
                    </a>
                </li>

                <li>
                    <a href="/riwayat">
                        Riwayat
                    </a>
                </li>

            </ul>

            <!-- PROFILE -->
            <div class="profile">

                <a href="/profil"> 
                    <img
                        src="{% if user and user.foto %}
                                {{ url_for('static', filename='uploads/' + user.foto) }}
                            {% else %}
                                {{ url_for('static', filename='uploads/default.png') }}
                            {% endif %}"
                        alt="Profile"
                    >
                </a>

            </div>

        </div>

    </nav>

    <!-- CONTENT -->
    <div class="content-wrapper">

        <h2 class="page-title">
            Form Pengajuan Loan
        </h2>

        <div class="card">

            <form method="post" onsubmit="showPopup(event)">

                <div class="form-grid">

                    <div class="form-group">

                        <label>
                            Jumlah Tanggungan
                        </label>

                        <input
                            type="number"
                            name="no_of_dependents"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label>
                            Status Pekerjaan
                        </label>

                        <select
                            name="self_employed"
                            required
                        >
                            <option value="">
                                Pilih Status
                            </option>

                            <option value="Yes">
                                Ya
                            </option>

                            <option value="No">
                                Tidak
                            </option>
                        </select>

                    </div>

                    <div class="form-group">

                        <label>
                            Penghasilan Perbulan
                        </label>

                        <input
                            type="number"
                            name="income_annum"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label>
                            Jumlah Pinjaman
                        </label>

                        <input
                            type="number"
                            name="loan_amount"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label>
                            Jangka Waktu (bulan)
                        </label>

                        <input
                            type="number"
                            name="loan_term"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label>
                            CIBIL Score
                        </label>

                        <input
                            type="number"
                            name="cibil_score"
                            required
                        >

                    </div>

                </div>

                <div class="submit-area">

                    <button
                        type="submit"
                        class="submit-btn"
                    >
                        Submit Pengajuan
                    </button>

                </div>

            </form>

        </div>

    </div>

</section>

<!-- POPUP -->
<div class="modal" id="successPopup">

    <div class="popup-box">

        <h3>Berhasil</h3>

        <p>
            Pengajuan loan berhasil dikirim.
        </p>

    </div>

</div>

<script>

function showPopup(event){

    event.preventDefault();

    document.getElementById('successPopup').style.display = 'flex';

    setTimeout(() => {
        event.target.submit();
    }, 1200);
}

</script>

</body>
</html>

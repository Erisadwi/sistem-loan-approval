<!DOCTYPE html>
<html>
<head>
    <title>Review Kasus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/riwayat.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .hero-review{
        background:
            linear-gradient(
            180deg,
            #cfd8f1 0%,
            #b8c6f0 30%,
            #f7dce5 70%,
            #f8ece5 100%
            );

        position:relative;
        overflow:hidden;
        }

        .hero-review::before{
        content:"";
        position:absolute;
        width:150%;
        height:280px;
        top:130px;
        left:-25%;
        background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
        transform:rotate(-5deg);
        }
        .btn-detail{
        background:#6c8cff;
        color:white;
        border:none;
        padding:8px 14px;
        border-radius:10px;
        cursor:pointer;
        }

        .btn-revise{
        background:#ffb347;
        color:white;
        border:none;
        padding:8px 14px;
        border-radius:10px;
        cursor:pointer;
        }

        .btn-retain{
        background:#4cd97b;
        color:white;
        border:none;
        padding:8px 14px;
        border-radius:10px;
        cursor:pointer;
        }
    </style>
</head>
<body>
<section class="hero hero-review">
    <nav class="navbar">

      <div class="logo">
        <img src="{{ url_for('static', filename='uploads/crypto-wallet.png') }}" alt="logo">
        <h1>Deciloan</h1>
      </div>

    <div class="nav-right">
        <ul class="nav-menu">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/form">Pengajuan</a></li>
        <li><a href="/review-ui" style="color:#ea08bd;">Review</a></li>
        <li><a href="/case_base">Basis Kasus</a></li>
        <li><a href="/riwayat">Riwayat</a></li>
        </ul>

    <div class="profile">
        <a href="/profil">
          <img src="{{ url_for('static', filename='uploads/profile.png') }}" alt="logo">
        </a>
    </div>
    </div>
    </nav>

    <div class="hero-content">
        <h1>Review Kasus Kredit</h1>
    <p>Proses Revise & Retain oleh analis</p>
    </div>
    
    <section class="history-section">
    <div class="table-container">
    <div class="table-header">
        <h2>Daftar Review Pending</h2>
    </div>
    <div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Income</th>
                <th>Loan</th>
                <th>CIBIL</th>
                <th>Keputusan Lama</th>
                <th>Keputusan Baru</th>
                <th>Catatan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    </div>
    </div>
    </section>
</section>


<script>
const API="http://127.0.0.1:5000";

window.onload = async () => {
    const res = await fetch(`${API}/me`, {credentials:"include"});

    if(res.status !== 200){
        alert("Silakan login dulu!");
        window.location.href="/";
        return;
    }

    loadData();
};

async function loadData(){
    const res = await fetch(`${API}/review/pending`,{
        credentials:"include"
    });

    const result = await res.json();
    const data = result.data;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML="";

    data.forEach(row=>{
        tbody.innerHTML+=`
        <tr>
            <td>${row.id_pengajuan}</td>
            <td>${row.income_annum}</td>
            <td>${row.loan_amount}</td>
            <td>${row.cibil_score}</td>
            <td><b>${row.keputusan}</b></td>

            <td>
                <select id="k_${row.id_pengajuan}" class="form-select">
                    <option ${row.keputusan=='Approved'?'selected':''}>Approved</option>
                    <option ${row.keputusan=='Rejected'?'selected':''}>Rejected</option>
                </select>
            </td>

            <td>
                <input 
                    id="c_${row.id_pengajuan}" 
                    class="form-control"
                    value="${row.catatan ?? ''}">
            </td>

            <td>
                <button class="btn-detail" onclick="detail(${row.id_pengajuan})">Detail</button>
                <button class="btn-revise" onclick="revise(${row.id_pengajuan})">Revise</button>
                <button class="btn-retain" onclick="retain(${row.id_pengajuan})">Retain</button>
            </td>
        </tr>`;
    });
}

async function revise(id){
    await fetch(`${API}/review/revise/${id}`,{
        method:"PUT",
        credentials:"include",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            keputusan:document.getElementById(`k_${id}`).value,
            catatan:document.getElementById(`c_${id}`).value
        })
    });
    alert("Revisi berhasil");
    loadData();
}

async function retain(id){
    try{
        const res = await fetch(`${API}/review/retain/${id}`,{
            method:"POST",
            credentials:"include"
        });

        const text = await res.text();

        if(!res.ok){
            throw new Error(text);
        }

        const data = JSON.parse(text);
        alert("Berhasil jadi kasus baru: "+data.loan_id_baru);
        loadData();

    }catch(err){
        alert("Retain gagal: " + err.message);
    }
}

function detail(id){
    window.location.href = `/hasil_analisis?id=${id}`;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Review Kasus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/riwayat.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .hero-review{
        background:
            linear-gradient(
            180deg,
            #cfd8f1 0%,
            #b8c6f0 30%,
            #f7dce5 70%,
            #f8ece5 100%
            );

        position:relative;
        overflow:hidden;
        }

        .hero-review::before{
        content:"";
        position:absolute;
        width:150%;
        height:280px;
        top:130px;
        left:-25%;
        background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
        transform:rotate(-5deg);
        }

        .action-cell{
        display:flex;
        flex-direction:column;
        gap:12px;
        min-width:150px;
        }
        .material-icons{
        font-size:18px;
        }

        .btn-detail,
        .btn-revise,
        .btn-retain{
        border:none;
        padding:8px 18px;
        border-radius:999px;
        font-size:13px;
        font-weight:600;
        cursor:pointer;
        transition:0.25s ease;
        box-shadow:0 4px 10px rgba(0,0,0,0.08);

        display:flex;
        align-items:center;
        gap:8px;
        }

        .btn-detail{
        background:linear-gradient(135deg,#7da7ff,#5c7cfa);
        color:white;
        }

        .btn-detail:hover{
        transform:translateY(-2px);
        box-shadow:0 8px 18px rgba(92,124,250,0.35);
        }

        .btn-revise{
        background:linear-gradient(135deg,#ffc46b,#f59f00);
        color:white;
        }

        .btn-revise:hover{
        transform:translateY(-2px);
        box-shadow:0 8px 18px rgba(245,159,0,0.35);
        }

        .btn-retain{
        background:linear-gradient(135deg,#69db7c,#2f9e44);
        color:white;
        }

        .btn-retain:hover{
        transform:translateY(-2px);
        box-shadow:0 8px 18px rgba(47,158,68,0.35);
        }
        .select-box{
        background:#f3f4f6;
        border-radius:12px;
        padding:6px 10px;
        width:140px;
        border:1px solid #e5e7eb;
        transition:.2s;
        }

        .select-box:hover{
        border-color:#d1d5db;
        }

        .select-box select{
        width:100%;
        border:none;
        background:transparent;
        outline:none;
        font-size:14px;
        color:#374151;
        cursor:pointer;
        }
        .input-box{
        background:#f3f4f6;
        border-radius:12px;
        padding:6px 10px;
        width:200px;
        border:1px solid #e5e7eb;
        transition:.2s;
        }

        .input-box:hover{
        border-color:#d1d5db;
        }

        .input-box input{
        width:100%;
        border:none;
        background:transparent;
        outline:none;
        font-size:14px;
        color:#000000;
        }

        .input-box::placeholder{
        color:#9aa0a6;
        font-style:italic;
        }

        .badge-Approved,
        .badge-Rejected{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-width:95px;
        height:34px;
        border-radius:999px;
        font-weight:600;
        font-size:13px;
        }

        .badge-Approved{
        background:#e6fcf5;
        color:#099268;
        }

        .badge-Rejected{
        background:#ffe3e3;
        color:#c92a2a;
        }

        .text-money{
        font-weight:600;
        color:#525151;
        letter-spacing:0.3px;
        }
    </style>
</head>
<body>
<section class="hero hero-review">
    <nav class="navbar">

      <div class="logo">
        <img src="{{ url_for('static', filename='uploads/crypto-wallet.png') }}" alt="logo">
        <h1>Deciloan</h1>
      </div>

    <div class="nav-right">
        <ul class="nav-menu">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/form">Pengajuan</a></li>
        <li><a href="/review-ui" style="color:#ea08bd;">Review</a></li>
        <li><a href="/case_base">Basis Kasus</a></li>
        <li><a href="/riwayat">Riwayat</a></li>
        </ul>

    <div class="profile">
        <a href="/profil">
          <img src="{{ url_for('static', filename='uploads/profile.png') }}" alt="logo">
        </a>
    </div>
    </div>
    </nav>

    <div class="hero-content">
        <h1>Review Kasus Kredit</h1>
    <p>Proses Revise & Retain oleh analis</p>
    </div>
    
    <section class="history-section">
    <div class="table-container">
    <div class="table-header">
        <h2>Daftar Review Pending</h2>
    </div>
    <div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Income</th>
                <th>Loan</th>
                <th>CIBIL</th>
                <th>Keputusan Lama</th>
                <th>Keputusan Baru</th>
                <th>Catatan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    </div>
    </div>
    </section>
</section>


<script>
const API="http://127.0.0.1:5000";

window.onload = async () => {
    const res = await fetch(`${API}/me`, {credentials:"include"});

    if(res.status !== 200){
        alert("Silakan login dulu!");
        window.location.href="/";
        return;
    }

    loadData();
};

function rupiah(angka){
    return "Rp " + Number(angka).toLocaleString("id-ID");
}

async function loadData(){
    const res = await fetch(`${API}/review/pending`,{
        credentials:"include"
    });

    const result = await res.json();
    const data = result.data;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML="";

    data.forEach(row=>{
        tbody.innerHTML+=`
        <tr>
            <td>${row.id_pengajuan}</td>
            <td class="text-money">${rupiah(row.income_annum)}</td>
            <td class="text-money">${rupiah(row.loan_amount)}</td>
            <td>${row.cibil_score}</td>
            <td> 
                <span class="badge-${row.keputusan}">
                    ${row.keputusan}
                </span>
            </td>

            <td>
                <div class="select-box">
                <select id="k_${row.id_pengajuan}" class="form-select">
                    <option ${row.keputusan=='Approved'?'selected':''}>Approved</option>
                    <option ${row.keputusan=='Rejected'?'selected':''}>Rejected</option>
                </select>
                </div>
            </td>

            <td>
                <div class="input-box">
                <input 
                    id="c_${row.id_pengajuan}" 
                    class="form-control"
                    placeholder="Masukkan catatan..."
                    value="${row.catatan ?? ''}">
                </div>
            </td>

            <td class="action-cell">
                <button class="btn-detail" onclick="detail(${row.id_pengajuan})">
                    <span class="material-icons">visibility</span>Detail
                </button>
                <button class="btn-revise" onclick="revise(${row.id_pengajuan})">
                    <span class="material-icons">edit</span>Revise
                </button>
                <button class="btn-retain" onclick="retain(${row.id_pengajuan})">
                    <span class="material-icons">save</span>Retain
                </button>
            </td>
        </tr>`;
    });
}

async function revise(id){
    await fetch(`${API}/review/revise/${id}`,{
        method:"PUT",
        credentials:"include",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            keputusan:document.getElementById(`k_${id}`).value,
            catatan:document.getElementById(`c_${id}`).value
        })
    });
    alert("Revisi berhasil");
    loadData();
}

async function retain(id){
    try{
        const res = await fetch(`${API}/review/retain/${id}`,{
            method:"POST",
            credentials:"include"
        });

        const text = await res.text();

        if(!res.ok){
            throw new Error(text);
        }

        const data = JSON.parse(text);
        alert("Berhasil jadi kasus baru: "+data.loan_id_baru);
        loadData();

    }catch(err){
        alert("Retain gagal: " + err.message);
    }
}

function detail(id){
    window.location.href = `/hasil_analisis?id=${id}`;
}
</script>

</body>
</html>

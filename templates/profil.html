<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    position:relative;

    background:
    linear-gradient(
        135deg,
        #ffdfdf,
        #f9d8f3,
        #e1cdef,
        #b3d8f5
    );
}

/* BACKGROUND GLOW */
body::before,
body::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:450px;
    height:450px;

    background:#f8c6ca;

    top:-120px;
    left:-120px;
}

body::after{
    width:450px;
    height:450px;

    background:#b3d8f5;

    bottom:-120px;
    right:-120px;
}

/* EXTRA GLOW */
.glow1,
.glow2{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    z-index:0;
}

.glow1{
    width:280px;
    height:280px;

    background:#dfcffb;

    top:20%;
    left:20%;
}

.glow2{
    width:300px;
    height:300px;

    background:#f8c6ca;

    bottom:10%;
    right:15%;
}

/* MAIN CARD */
.profile-card{
    width:420px;

    position:relative;
    z-index:2;

    padding:40px;

    border-radius:40px;

    background:
        rgba(255,255,255,0.10);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.18);

    box-shadow:
        0 8px 32px rgba(31,38,135,0.18),
        inset 0 0 20px rgba(255,255,255,0.08);

    text-align:center;

    color:white;
}

/* PHOTO */
.profile-photo{
    width:130px;
    height:130px;

    margin:auto;
    margin-bottom:20px;

    position:relative;
}

.profile-photo::before{
    content:'';

    position:absolute;
    inset:-8px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.9),
        rgba(248,198,202,0.9)
    );

    filter:blur(10px);

    z-index:-1;
}

.profile-photo img{
    width:100%;
    height:100%;

    border-radius:50%;
    object-fit:cover;

    border:4px solid rgba(255,255,255,0.35);

    box-shadow:
        0 0 25px rgba(255,255,255,0.2);
}

/* NAME */
.profile-card h2{
    font-size:32px;
    font-weight:600;

    margin-bottom:8px;

    text-shadow:
        0 2px 10px rgba(0,0,0,0.15);
}

/* SUBTITLE */
.subtitle{
    font-size:14px;

    color:
        rgba(255,255,255,0.75);

    margin-bottom:30px;
}

/* INFO BOX */
.info-box{
    background:
        rgba(255,255,255,0.08);

    border:
        1px solid rgba(255,255,255,0.12);

    border-radius:22px;

    padding:20px;

    margin-bottom:25px;

    text-align:left;
}

/* INFO ITEM */
.info-item{
    margin-bottom:18px;
}

.info-item:last-child{
    margin-bottom:0;
}

.info-label{
    font-size:13px;

    color:
        rgba(255,255,255,0.65);

    margin-bottom:5px;
}

.info-value{
    font-size:15px;

    color:white;
}

/* BUTTON */
.edit-btn{
    width:100%;

    padding:15px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    font-size:15px;
    font-weight:600;

    color:#444;

    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.95),
        rgba(248,198,202,0.95)
    );

    transition:0.3s;

    box-shadow:
        0 10px 30px rgba(223,207,251,0.35);

    margin-bottom:12px;
}

.edit-btn:hover{
    transform:
        translateY(-3px)
        scale(1.02);

    box-shadow:
        0 15px 40px rgba(248,198,202,0.4);
}

/* LOGOUT */
.logout-btn{
    width:100%;

    display:block;

    padding:14px;

    border-radius:18px;

    text-decoration:none;

    color:white;

    background:
        rgba(255,255,255,0.10);

    border:
        1px solid rgba(255,255,255,0.12);

    transition:0.3s;
}

.logout-btn:hover{
    background:
        rgba(255,255,255,0.18);

    transform:
        translateY(-2px);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;

    background:
        rgba(0,0,0,0.25);

    backdrop-filter:blur(10px);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;
}

.modal-content{
    width:400px;

    padding:35px;

    border-radius:30px;

    background:
        rgba(255,255,255,0.12);

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.18);

    color:white;
}

/* MODAL TITLE */
.modal-content h3{
    margin-bottom:25px;
    text-align:center;

    font-size:28px;
}

/* INPUT */
input{
    width:100%;

    padding:14px 16px;

    margin-bottom:16px;

    border:none;
    outline:none;

    border-radius:15px;

    background:
        rgba(255,255,255,0.35);

    color:#444;

    transition:0.3s;
}

input:focus{
    background:
        rgba(255,255,255,0.55);

    transform:scale(1.02);

    box-shadow:
        0 0 0 4px rgba(179,216,245,0.25);
}

input[type="file"]{
    color:white;
}

/* MODAL BUTTONS */
.modal-buttons{
    display:flex;
    gap:10px;
}

.save-btn,
.cancel-btn{
    flex:1;

    padding:14px;

    border:none;
    border-radius:15px;

    cursor:pointer;

    font-weight:600;

    transition:0.3s;
}

.save-btn{
    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.95),
        rgba(248,198,202,0.95)
    );

    color:#444;
}

.cancel-btn{
    background:
        rgba(255,255,255,0.12);

    color:white;
}

.save-btn:hover,
.cancel-btn:hover{
    transform:translateY(-2px);
}

/* RESPONSIVE */
@media(max-width:500px){

    .profile-card{
        width:92%;
        padding:30px;
    }

    .modal-content{
        width:92%;
    }
}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<!-- PROFILE -->
<div class="profile-card">

    <!-- PHOTO -->
    <div class="profile-photo">

        <img
            src="{{ url_for('static', filename='uploads/' + user.foto) }}?v={{ range(1,9999) | random }}"
            alt="Profile"
        >

    </div>

    <!-- NAME -->
    <h2>{{ user.nama }}</h2>

    <p class="subtitle">
        Loan Approval System User
    </p>

    <!-- INFO -->
    <div class="info-box">

        <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value">
                {{ user.email }}
            </div>
        </div>

        <div class="info-item">
            <div class="info-label">Account Status</div>
            <div class="info-value">
                Active
            </div>
        </div>

    </div>

    <!-- BUTTON -->
    <button
        class="edit-btn"
        onclick="openModal()"
    >
        Edit Profile
    </button>

    <a href="/logout" class="logout-btn">
        Logout
    </a>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

    <div class="modal-content">

        <h3>Edit Profile</h3>

        <form method="POST" enctype="multipart/form-data">

            <input
                type="text"
                name="nama"
                value="{{ user.nama }}"
                placeholder="Nama"
            >

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                placeholder="Email"
            >

            <input
                type="file"
                name="foto"
            >

            <div class="modal-buttons">

                <button
                    type="submit"
                    class="save-btn"
                >
                    Save
                </button>

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="closeModal()"
                >
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal(){
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

</script>

</body>
</html>

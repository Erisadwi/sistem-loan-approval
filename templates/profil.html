<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    position:relative;

    background:
    linear-gradient(
        135deg,
        #ffdfdf,
        #f9d8f3,
        #e1cdef,
        #b3d8f5
    );
}

/* BACKGROUND */
body::before,
body::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:450px;
    height:450px;
    background:#f8c6ca;

    top:-120px;
    left:-120px;
}

body::after{
    width:450px;
    height:450px;
    background:#b3d8f5;

    bottom:-120px;
    right:-120px;
}

/* EXTRA GLOW */
.glow1,
.glow2{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    z-index:0;
}

.glow1{
    width:280px;
    height:280px;

    background:#dfcffb;

    top:20%;
    left:20%;
}

.glow2{
    width:300px;
    height:300px;

    background:#f8c6ca;

    bottom:10%;
    right:15%;
}

/* CARD */
.profile-card{
    width:420px;

    position:relative;
    z-index:2;

    padding:40px;

    border-radius:40px;

    background:
        rgba(255,255,255,0.10);

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.18);

    box-shadow:
        0 8px 32px rgba(31,38,135,0.18),
        inset 0 0 20px rgba(255,255,255,0.08);

    text-align:center;

    color:white;
}

/* FOTO */
.profile-photo{
    width:130px;
    height:130px;

    margin:auto;
    margin-bottom:20px;

    position:relative;
}

.profile-photo::before{
    content:'';

    position:absolute;
    inset:-8px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.9),
        rgba(248,198,202,0.9)
    );

    filter:blur(10px);

    z-index:-1;
}

.profile-photo img{
    width:100%;
    height:100%;

    border-radius:50%;
    object-fit:cover;

    border:4px solid rgba(255,255,255,0.35);
}

/* TITLE */
.profile-card h2{
    font-size:32px;
    margin-bottom:8px;
}

.subtitle{
    font-size:14px;
    color:rgba(255,255,255,0.75);

    margin-bottom:30px;
}

/* INFO */
.info-box{
    background:
        rgba(255,255,255,0.08);

    border:
        1px solid rgba(255,255,255,0.12);

    border-radius:22px;

    padding:20px;

    margin-bottom:25px;

    text-align:left;
}

.info-item{
    margin-bottom:18px;
}

.info-item:last-child{
    margin-bottom:0;
}

.info-label{
    font-size:13px;

    color:
        rgba(255,255,255,0.65);

    margin-bottom:5px;
}

.info-value{
    font-size:15px;
}

/* BUTTON */
.edit-btn{
    width:100%;

    padding:15px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    font-size:15px;
    font-weight:600;

    color:#444;

    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.95),
        rgba(248,198,202,0.95)
    );

    transition:0.3s;

    margin-bottom:12px;
}

.edit-btn:hover{
    transform:
        translateY(-3px)
        scale(1.02);
}

/* LOGOUT */
.logout-btn{
    width:100%;

    padding:14px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    background:
        rgba(255,255,255,0.10);

    border:
        1px solid rgba(255,255,255,0.12);

    color:white;

    transition:0.3s;
}

.logout-btn:hover{
    background:
        rgba(255,255,255,0.18);
}

/* DELETE */
.delete-account{
    margin-top:18px;

    font-size:13px;

    color:
        rgba(255,255,255,0.65);

    cursor:pointer;

    transition:0.3s;
}

.delete-account:hover{
    color:#ffd0d0;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;

    background:
        rgba(0,0,0,0.25);

    backdrop-filter:blur(10px);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;
}

/* MODAL CONTENT */
.modal-content,
.popup-box{
    width:400px;

    padding:35px;

    border-radius:30px;

    background:
        rgba(255,255,255,0.12);

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.18);

    color:white;

    animation:popupShow 0.3s ease;
}

/* MODAL TITLE */
.modal-content h3,
.popup-box h3{
    margin-bottom:25px;
    text-align:center;

    font-size:28px;
}

/* INPUT */
input{
    width:100%;

    padding:14px 16px;

    margin-bottom:16px;

    border:none;
    outline:none;

    border-radius:15px;

    background:
        rgba(255,255,255,0.35);

    color:#444;

    transition:0.3s;
}

input:focus{
    background:
        rgba(255,255,255,0.55);

    transform:scale(1.02);
}

input[type="file"]{
    color:white;
}

/* BUTTONS */
.modal-buttons,
.popup-buttons{
    display:flex;
    gap:10px;
}

.save-btn,
.cancel-btn,
.confirm-btn,
.delete-btn{
    flex:1;

    padding:14px;

    border:none;
    border-radius:15px;

    cursor:pointer;

    font-weight:600;

    transition:0.3s;

    text-decoration:none;

    text-align:center;
}

/* SAVE */
.save-btn,
.confirm-btn{
    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.95),
        rgba(248,198,202,0.95)
    );

    color:#444;
}

/* CANCEL */
.cancel-btn{
    background:
        rgba(255,255,255,0.12);

    color:white;
}


/* HOVER */
.save-btn:hover,
.cancel-btn:hover,
.confirm-btn:hover,
.delete-btn:hover{
    transform:
        translateY(-2px);
}

/* POPUP TEXT */
.popup-box p{
    font-size:15px;

    line-height:1.6;

    color:
        rgba(255,255,255,0.82);

    margin-bottom:25px;

    text-align:center;
}

/* ANIMATION */
@keyframes popupShow{

    from{
        opacity:0;
        transform:
            scale(0.8);
    }

    to{
        opacity:1;
        transform:
            scale(1);
    }
}

/* RESPONSIVE */
@media(max-width:500px){

    .profile-card{
        width:92%;
        padding:30px;
    }

    .modal-content,
    .popup-box{
        width:92%;
    }
}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<!-- PROFILE -->
<div class="profile-card">

    <!-- FOTO -->
    <div class="profile-photo">

        <img
            src="{{ url_for('static', filename='uploads/' + user.foto) }}?v={{ range(1,9999) | random }}"
            alt="Profile"
        >

    </div>

    <!-- NAME -->
    <h2>{{ user.nama }}</h2>

    <p class="subtitle">
        Loan Approval System User
    </p>

    <!-- INFO -->
    <div class="info-box">

        <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value">
                {{ user.email }}
            </div>
        </div>

        <div class="info-item">
            <div class="info-label">Status Akun</div>
            <div class="info-value">
                Aktif
            </div>
        </div>

    </div>

    <!-- BUTTON -->
    <button
        class="edit-btn"
        onclick="openModal()"
    >
        Edit Profil
    </button>

    <button
        class="logout-btn"
        onclick="openLogoutModal()"
    >
        Logout
    </button>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="modal">

    <div class="modal-content">

        <h3>Edit Profil</h3>

        <form
            method="POST"
            enctype="multipart/form-data"
            onsubmit="showSavePopup(event)"
        >

            <input
                type="text"
                name="nama"
                value="{{ user.nama }}"
                placeholder="Nama"
            >

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                placeholder="Email"
            >

            <input
                type="file"
                name="foto"
            >

            <div class="modal-buttons">

                <button
                    type="submit"
                    class="save-btn"
                >
                    Simpan
                </button>

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="closeModal()"
                >
                    Batal
                </button>

            </div>

        </form>

    </div>

</div>

<!-- MODAL LOGOUT -->
<div class="modal" id="logoutModal">

    <div class="popup-box">

        <h3>Logout</h3>

        <p>
            Apakah kamu yakin ingin keluar?
        </p>

        <div class="popup-buttons">

            <button
                class="cancel-btn"
                onclick="closeLogoutModal()"
            >
                Batal
            </button>

            <a href="/logout" class="confirm-btn">
                Ya, Logout
            </a>

        </div>

    </div>

</div>



<!-- POPUP SAVE -->
<div class="modal" id="savePopup">

    <div class="popup-box">

        <h3>Berhasil</h3>

        <p>
            Profil berhasil diperbarui.
        </p>

    </div>

</div>

<script>

/* EDIT */
function openModal(){
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

/* LOGOUT */
function openLogoutModal(){
    document.getElementById('logoutModal').style.display = 'flex';
}

function closeLogoutModal(){
    document.getElementById('logoutModal').style.display = 'none';
}

/* DELETE */
function openDeleteModal(){
    document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal(){
    document.getElementById('deleteModal').style.display = 'none';
}

/* SAVE */
function showSavePopup(event){

    event.preventDefault();

    document.getElementById('savePopup').style.display = 'flex';

    setTimeout(() => {
        event.target.submit();
    }, 1200);
}

</script>

</body>
</html>

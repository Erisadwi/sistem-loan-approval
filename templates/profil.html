<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/profil.css') }}">

<title>Profile</title>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>
<div class="glow3"></div>

<!-- PROFILE -->
<div class="profile-card">

    <!-- LEFT -->
    <div class="profile-left">

        <div class="profile-photo">

            <img
                src="{{ url_for('static', filename='uploads/' + user.foto) }}?v={{ range(1,9999) | random }}"
                alt="Profile"
            >

        </div>

        <h2>{{ user.nama }}</h2>

        <p class="subtitle">
            Loan Approval System User
        </p>

    </div>

    <!-- RIGHT -->
    <div class="profile-right">

        <h3 class="section-title">
            Informasi Profil
        </h3>

        <div class="info-grid">

            <div class="info-box">
                <div class="info-label">Email</div>
                <div class="info-value">
                    {{ user.email }}
                </div>
            </div>

            <div class="info-box">
                <div class="info-label">Status Akun</div>
                <div class="info-value">
                    Aktif
                </div>
            </div>

        </div>

        <div class="button-group">

            <button
                class="edit-btn"
                onclick="openModal()"
            >
                <i class="fa-solid fa-pen"></i>
                Edit Profil
            </button>

            <button
                class="logout-btn"
                onclick="openLogoutModal()"
            >
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </button>

        </div>

        <div class="back-area">

            <a href="javascript:history.back()" class="back-btn">
                ← Kembali
            </a>

        </div>

    </div>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="modal">

    <div class="modal-content">

        <h3>Edit Profil</h3>

        <form
            method="POST"
            enctype="multipart/form-data"
            onsubmit="showSavePopup(event)"
        >

            <input
                type="text"
                name="nama"
                value="{{ user.nama }}"
                placeholder="Nama"
            >

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                placeholder="Email"
            >

            <input
                type="file"
                name="foto"
            >

            <div class="modal-buttons">

                <button
                    type="submit"
                    class="save-btn"
                >
                    Simpan
                </button>

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="closeModal()"
                >
                    Batal
                </button>

            </div>

        </form>

    </div>

</div>

<!-- MODAL LOGOUT -->
<div class="modal" id="logoutModal">

    <div class="popup-box">

        <h3>Logout</h3>

        <p>
            Apakah kamu yakin ingin keluar?
        </p>

        <div class="popup-buttons">

            <button
                class="cancel-btn"
                onclick="closeLogoutModal()"
            >
                Batal
            </button>

            <a href="/logout" class="confirm-btn">
                Ya, Logout
            </a>

        </div>

    </div>

</div>

<!-- POPUP SAVE -->
<div class="modal" id="savePopup">

    <div class="popup-box">

        <h3>Berhasil</h3>

        <p>
            Profil berhasil diperbarui.
        </p>

    </div>

</div>

<script>

/* EDIT */
function openModal(){
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

/* LOGOUT */
function openLogoutModal(){
    document.getElementById('logoutModal').style.display = 'flex';
}

function closeLogoutModal(){
    document.getElementById('logoutModal').style.display = 'none';
}

/* SAVE */
function showSavePopup(event){

    event.preventDefault();

    document.getElementById('savePopup').style.display = 'flex';

    setTimeout(() => {
        event.target.submit();
    }, 1200);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    position:relative;

    background:
    linear-gradient(
        135deg,
        #ffdfdf,
        #f9d8f3,
        #e1cdef,
        #b3d8f5
    );
}

/* BACKGROUND GLOW */
body::before,
body::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
    z-index:0;
}

body::before{
    width:500px;
    height:500px;

    background:#f8c6ca;

    top:-180px;
    left:-180px;
}

body::after{
    width:500px;
    height:500px;

    background:#b3d8f5;

    bottom:-180px;
    right:-180px;
}

/* EXTRA GLOW */
.glow1,
.glow2,
.glow3{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

.glow1{
    width:300px;
    height:300px;

    background:#dfcffb;

    top:20%;
    left:18%;
}

.glow2{
    width:350px;
    height:350px;

    background:#f8c6ca;

    bottom:10%;
    right:15%;
}

.glow3{
    width:300px;
    height:300px;

    background:#f9d8f3;

    top:45%;
    left:45%;

    opacity:0.5;
}

/* MAIN CARD */
.profile-card{
    width:950px;
    min-height:520px;

    position:relative;
    z-index:2;

    display:flex;
    overflow:hidden;

    border-radius:40px;

    background:
        rgba(255,255,255,0.10);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    border:
        1px solid rgba(255,255,255,0.18);

    box-shadow:
        0 20px 50px rgba(31,38,135,0.15),
        inset 0 0 30px rgba(255,255,255,0.08);
}

/* LEFT SIDE */
.profile-left{
    width:38%;

    padding:50px 40px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;

    background:
        rgba(255,255,255,0.08);

    border-right:
        1px solid rgba(255,255,255,0.12);
}

/* AVATAR */
.profile-photo{
    width:170px;
    height:170px;

    margin-bottom:28px;

    position:relative;
}

.profile-photo::before{
    content:'';

    position:absolute;
    inset:-10px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.9),
        rgba(248,198,202,0.9)
    );

    filter:blur(15px);

    z-index:-1;
}

.profile-photo img{
    width:100%;
    height:100%;

    border-radius:50%;
    object-fit:cover;

    border:5px solid rgba(255,255,255,0.35);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.12);
}

/* NAME */
.profile-left h2{
    font-size:42px;
    font-weight:700;

    color:white;

    margin-bottom:10px;

    text-shadow:
        0 4px 15px rgba(0,0,0,0.12);
}

/* SUBTITLE */
.subtitle{
    font-size:15px;

    color:
        rgb(98, 98, 208);

    text-align:center;

    line-height:1.7;
}

/* RIGHT SIDE */
.profile-right{
    flex:1;

    padding:55px;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* TITLE */
.section-title{
    font-size:34px;
    font-weight:700;

    color:white;

    margin-bottom:35px;

    text-shadow:
        0 4px 15px rgba(0,0,0,0.10);
}

/* INFO GRID */
.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;

    margin-bottom:35px;
}

/* INFO CARD */
.info-box{
    padding:24px;

    border-radius:24px;

    background:
        rgba(255,255,255,0.16);

    border:
        1px solid rgba(255,255,255,0.18);

    backdrop-filter:blur(18px);

    box-shadow:
        inset 0 0 12px rgba(255,255,255,0.08);
}

.info-label{
    font-size:14px;

    color:
        rgba(4, 4, 4, 0.884);

    margin-bottom:10px;
}

.info-value{
    font-size:20px;
    font-weight:600;

    color:white;
}

/* BUTTON AREA */
.button-group{
    display:flex;
    gap:16px;
}

/* EDIT BUTTON */
.edit-btn{
    flex:1;

    padding:16px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    font-size:16px;
    font-weight:600;

    color:#3d3d3d;

    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,1),
        rgba(248,198,202,1)
    );

    transition:0.3s;

    box-shadow:
        0 10px 25px rgba(223,207,251,0.35);
}

.edit-btn:hover{
    transform:
        translateY(-3px);

    box-shadow:
        0 15px 35px rgba(248,198,202,0.35);
}

/* LOGOUT */
.logout-btn{
    flex:1;

    padding:16px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    background:
        rgba(255,255,255,0.14);

    border:
        1px solid rgba(255,255,255,0.18);

    color:white;

    font-weight:600;

    transition:0.3s;

    backdrop-filter:blur(12px);
}

.logout-btn:hover{
    background:
        rgba(255,255,255,0.24);

    transform:
        translateY(-2px);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;

    background:
        rgba(0,0,0,0.25);

    backdrop-filter:blur(10px);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;
}

/* MODAL CONTENT */
.modal-content,
.popup-box{
    width:400px;

    padding:35px;

    border-radius:30px;

    background:
        rgba(255,255,255,0.12);

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.18);

    color:white;

    animation:popupShow 0.3s ease;
}

/* MODAL TITLE */
.modal-content h3,
.popup-box h3{
    margin-bottom:25px;
    text-align:center;

    font-size:28px;
}

/* INPUT */
input{
    width:100%;

    padding:14px 16px;

    margin-bottom:16px;

    border:none;
    outline:none;

    border-radius:15px;

    background:
        rgba(255,255,255,0.35);

    color:#444;

    transition:0.3s;
}

input:focus{
    background:
        rgba(255,255,255,0.55);

    transform:scale(1.02);
}

input[type="file"]{
    color:white;
}

/* BUTTONS */
.modal-buttons,
.popup-buttons{
    display:flex;
    gap:10px;
}

.save-btn,
.cancel-btn,
.confirm-btn,
.delete-btn{
    flex:1;

    padding:14px;

    border:none;
    border-radius:15px;

    cursor:pointer;

    font-weight:600;

    transition:0.3s;

    text-decoration:none;

    text-align:center;
}

/* SAVE */
.save-btn,
.confirm-btn{
    background:
    linear-gradient(
        135deg,
        rgba(223,207,251,0.95),
        rgba(248,198,202,0.95)
    );

    color:#444;
}

/* CANCEL */
.cancel-btn{
    background:
        rgba(255,255,255,0.12);

    color:white;
}

/* HOVER */
.save-btn:hover,
.cancel-btn:hover,
.confirm-btn:hover,
.delete-btn:hover{
    transform:
        translateY(-2px);
}

/* POPUP TEXT */
.popup-box p{
    font-size:15px;

    line-height:1.6;

    color:
        rgba(255,255,255,0.82);

    margin-bottom:25px;

    text-align:center;
}

/* ANIMATION */
@keyframes popupShow{

    from{
        opacity:0;
        transform:
            scale(0.8);
    }

    to{
        opacity:1;
        transform:
            scale(1);
    }
}

/* RESPONSIVE */
@media(max-width:900px){

    .profile-card{
        width:92%;
        flex-direction:column;
    }

    .profile-left{
        width:100%;

        border-right:none;
        border-bottom:
            1px solid rgba(255,255,255,0.12);
    }

    .profile-right{
        padding:35px;
    }

    .info-grid{
        grid-template-columns:1fr;
    }

    .button-group{
        flex-direction:column;
    }
}

@media(max-width:500px){

    .modal-content,
    .popup-box{
        width:92%;
    }
}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>
<div class="glow3"></div>

<!-- PROFILE -->
<div class="profile-card">

    <!-- LEFT -->
    <div class="profile-left">

        <div class="profile-photo">

            <img
                src="{{ url_for('static', filename='uploads/' + user.foto) }}?v={{ range(1,9999) | random }}"
                alt="Profile"
            >

        </div>

        <h2>{{ user.nama }}</h2>

        <p class="subtitle">
            Loan Approval System User
        </p>

    </div>

    <!-- RIGHT -->
    <div class="profile-right">

        <h3 class="section-title">
            Profile Information
        </h3>

        <div class="info-grid">

            <div class="info-box">
                <div class="info-label">Email</div>
                <div class="info-value">
                    {{ user.email }}
                </div>
            </div>

            <div class="info-box">
                <div class="info-label">Status Akun</div>
                <div class="info-value">
                    Aktif
                </div>
            </div>

        </div>

        <div class="button-group">

            <button
                class="edit-btn"
                onclick="openModal()"
            >
                Edit Profil
            </button>

            <button
                class="logout-btn"
                onclick="openLogoutModal()"
            >
                Logout
            </button>

        </div>

    </div>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="modal">

    <div class="modal-content">

        <h3>Edit Profil</h3>

        <form
            method="POST"
            enctype="multipart/form-data"
            onsubmit="showSavePopup(event)"
        >

            <input
                type="text"
                name="nama"
                value="{{ user.nama }}"
                placeholder="Nama"
            >

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                placeholder="Email"
            >

            <input
                type="file"
                name="foto"
            >

            <div class="modal-buttons">

                <button
                    type="submit"
                    class="save-btn"
                >
                    Simpan
                </button>

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="closeModal()"
                >
                    Batal
                </button>

            </div>

        </form>

    </div>

</div>

<!-- MODAL LOGOUT -->
<div class="modal" id="logoutModal">

    <div class="popup-box">

        <h3>Logout</h3>

        <p>
            Apakah kamu yakin ingin keluar?
        </p>

        <div class="popup-buttons">

            <button
                class="cancel-btn"
                onclick="closeLogoutModal()"
            >
                Batal
            </button>

            <a href="/logout" class="confirm-btn">
                Ya, Logout
            </a>

        </div>

    </div>

</div>

<!-- POPUP SAVE -->
<div class="modal" id="savePopup">

    <div class="popup-box">

        <h3>Berhasil</h3>

        <p>
            Profil berhasil diperbarui.
        </p>

    </div>

</div>

<script>

/* EDIT */
function openModal(){
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

/* LOGOUT */
function openLogoutModal(){
    document.getElementById('logoutModal').style.display = 'flex';
}

function closeLogoutModal(){
    document.getElementById('logoutModal').style.display = 'none';
}

/* DELETE */
function openDeleteModal(){
    document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal(){
    document.getElementById('deleteModal').style.display = 'none';
}

/* SAVE */
function showSavePopup(event){

    event.preventDefault();

    document.getElementById('savePopup').style.display = 'flex';

    setTimeout(() => {
        event.target.submit();
    }, 1200);
}

</script>

</body>
</html>
